<script>
  const splat = new Audio("splat.mp3");
  const pan = document.getElementById("tt");
  const buff = document.getElementById("r");
  const ar = document.getElementById("arr");
  

  const buffOn = (flag) => {
    if (flag) {
      buff.style.visibility = "visable";
      buff.style.zIndex = "5";
    } else {
      buff.style.visibility = "hidden";
      buff.style.zIndex = "0";
    }
  };
 const work=()=>{
      buffOn(1);
    let xxc =
      window.innerHeight > window.innerWidth
        ? window.innerWidth
        : window.innerHeight;
    pan.style.scale = `${xxc / 1000}`;
    buffOn(0);
  };

  window.onload = (event) => {
              ar.style.transition='ease 1ms'
work();
ar.style.transition='ease 500ms'
  };
  window.onresize = (event) => {
          ar.style.transition='ease 1ms'
work();
ar.style.transition='ease 500ms'
  };
</script>
